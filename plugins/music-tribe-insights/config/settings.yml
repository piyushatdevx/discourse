music_tribe_insights:
  music_tribe_insights_enabled:
    default: true
    client: true
    description: "Enable Community Insights (report types / recurring themes) powered by AWS Bedrock. Admin only."
    type: bool

server:
  music_tribe_insights_aws_region:
    default: "ap-south-1"
    description: "AWS region for Bedrock (e.g. ap-south-1). Or set AWS_REGION in the server environment."
    type: string
  music_tribe_insights_model_id:
    default: "anthropic.claude-3-haiku-20240307-v1:0"
    description: "Bedrock model ID (e.g. anthropic.claude-3-haiku-20240307-v1:0)"
    type: string
  music_tribe_insights_days_to_analyze:
    default: 30
    min: 7
    max: 90
    description: "Number of days of posts to include when generating insights"
    type: integer
  music_tribe_insights_max_posts:
    default: 500
    min: 50
    max: 2000
    description: "Maximum number of recent topics to analyze (one opening post per topic; replies are not sent)"
    type: integer
  music_tribe_insights_min_posts_per_theme:
    default: 3
    min: 2
    max: 20
    description: "Minimum number of topics to consider a recurring theme / report type"
    type: integer
