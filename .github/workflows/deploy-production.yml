name: Deploy to Production

on:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Notify Deploy Started
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"text":"🚀 Production deployment started..."}'
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          timeout: 25m
          script: |
            cd /var/discourse
            sudo ./launcher rebuild app

      - name: Health Check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          sleep 30
          HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" "https://$DEPLOY_HOST" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Site is up and responding"
          else
            echo "⚠ Site returned HTTP $HTTP_CODE (may still be starting)"
          fi

      - name: Notify Success
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"text":"✅ Production deployment successful!"}'
          fi

      - name: Notify Failure
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"text":"❌ Production deployment failed!"}'
          fi
